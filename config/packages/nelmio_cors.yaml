nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin: '%env(csv:CORS_ORIGINS)%'
        allow_credentials: false
        allow_headers: ['Authorization', 'Content-Type', 'Accept']
        allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        max_age: 600
    paths:
        '^/api/':
            allow_origin: '%env(csv:CORS_ORIGINS)%'
