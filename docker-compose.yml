x-app-env: &app-env
  DATABASE_URL: postgresql://vayno:vayno@db:5432/vayno?serverVersion=16&charset=utf8
  MESSENGER_TRANSPORT_DSN: sync://

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      <<: *app-env
      APP_ENV: dev
      APP_DEBUG: 1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/vendor
    command: sh -c "composer install --no-interaction && php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration && php -S 0.0.0.0:8000 -t public"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vayno
      POSTGRES_PASSWORD: vayno
      POSTGRES_DB: vayno
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vayno -d vayno"]
      interval: 5s
      timeout: 5s
      retries: 5

  scheduler:
    build: .
    env_file:
      - .env
    environment:
      <<: *app-env
      APP_ENV: dev
      APP_DEBUG: 1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/vendor
    command: sh -c "composer install --no-interaction && php bin/console messenger:consume scheduler_default -vv --time-limit=3600"

volumes:
  postgres_data:
