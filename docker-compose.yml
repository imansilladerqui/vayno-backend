x-app-env: &app-env
  DATABASE_URL: postgresql://vayno:vayno@db:5432/vayno?serverVersion=16&charset=utf8

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      <<: *app-env
      APP_ENV: dev
      APP_DEBUG: 1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/vendor
    command: sh -c "test -f .env || printf 'APP_ENV=dev\n' > .env && php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration && php -S 0.0.0.0:8000 -t public public/router.php"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vayno
      POSTGRES_PASSWORD: vayno
      POSTGRES_DB: vayno
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vayno -d vayno"]
      interval: 5s
      timeout: 5s
      retries: 5

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
  postgres_data:

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
