name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vayno
          POSTGRES_PASSWORD: vayno
          POSTGRES_DB: vayno_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vayno -d vayno_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://vayno:vayno@localhost:5432/vayno_test?serverVersion=16&charset=utf8
          APP_SECRET: ci-test-secret-key-min-32-chars-long
          ALLOW_OWNER_REGISTRATION: 'true'
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run tests
        env:
          DATABASE_URL: postgresql://vayno:vayno@localhost:5432/vayno_test?serverVersion=16&charset=utf8
          APP_SECRET: ci-test-secret-key-min-32-chars-long
          ALLOW_OWNER_REGISTRATION: 'true'
          CORS_ORIGINS: http://localhost:3000
        run: vendor/bin/phpunit

      - name: Build Docker image
        run: docker build -t vayno-backend:ci .
